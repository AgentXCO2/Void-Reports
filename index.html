<!DOCTYPE html>
<html>
<head>
  <title>Void Guard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    /* TABS */
    .tabs {
      display: flex;
      background: #000;
      border-bottom: 1px solid #111;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      background: #000;
      border-right: 1px solid #111;
      font-size: 13px;
    }

    .tab:hover { background: #0a0a0a; }

    .active { background: #6a00ff; }

    /* PAGES */
    .page {
      display: none;
      padding: 18px;
      height: calc(100vh - 50px);
      overflow-y: auto;
      background: #000;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #111;
      background: #000;
      color: white;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #6a00ff;
      color: white;
      cursor: pointer;
    }

    button:hover { opacity: 0.9; }

    .result {
      margin-top: 12px;
      white-space: pre-wrap;
      font-size: 13px;
      color: #ddd;
    }

    .card {
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #111;
      border-radius: 10px;
      background: #050505;
    }

    .safe { color: limegreen; }
    .mid { color: orange; }
    .bad { color: red; }
  </style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="openTab(0)">AI Scan</div>
  <div class="tab" onclick="openTab(1)">File Scan</div>
  <div class="tab" onclick="openTab(2)">Report</div>
  <div class="tab" onclick="openTab(3)">History</div>
  <div class="tab" onclick="openTab(4)">Threat DB</div>
</div>

<!-- AI SCAN -->
<div class="page" style="display:block;" id="tab0">
  <h2>🧠 AI URL Scanner</h2>

  <input id="urlInput" placeholder="Paste URL">
  <button onclick="scanURL()">Scan</button>

  <div class="result" id="urlResult"></div>

  <div class="card" id="aiExplain">
    🧠 AI Explanation will appear here after scan
  </div>
</div>

<!-- FILE SCAN -->
<div class="page" id="tab1">
  <h2>📁 File Scanner</h2>

  <input type="file" id="fileInput">
  <button onclick="scanFile()">Scan File</button>

  <div id="fileResult"></div>
</div>

<!-- REPORT -->
<div class="page" id="tab2">
  <h2>🛡️ Report Site</h2>

  <input id="reportUrl" placeholder="Suspicious URL">

  <select id="reportType">
    <option>Phishing</option>
    <option>Malware</option>
    <option>Crypto Scam</option>
    <option>Fake Store</option>
    <option>Other</option>
  </select>

  <button onclick="generateReport()">Generate Report</button>

  <div class="result" id="reportOutput"></div>

  <button onclick="sendMicrosoft()">Report to Microsoft</button>
  <button onclick="sendGoogle()">Report to Google</button>
</div>

<!-- HISTORY -->
<div class="page" id="tab3">
  <h2>📜 Scan History</h2>
  <div id="history"></div>
</div>

<!-- THREAT DB -->
<div class="page" id="tab4">
  <h2>🌍 Threat Database</h2>
  <div id="threatDB"></div>
</div>

<script>

let reportText = "";

/* ---------------- TABS ---------------- */
function openTab(i) {
  const pages = document.querySelectorAll(".page");
  const tabs = document.querySelectorAll(".tab");

  pages.forEach(p => p.style.display = "none");
  tabs.forEach(t => t.classList.remove("active"));

  pages[i].style.display = "block";
  tabs[i].classList.add("active");

  if (i === 3) loadHistory();
  if (i === 4) loadThreatDB();
}

/* ---------------- AI SCAN ---------------- */
function scanURL() {
  const url = document.getElementById("urlInput").value;
  if (!url) return alert("Enter URL");

  let score = 0;
  let reasons = [];

  if (url.includes("login")) { score += 30; reasons.push("Phishing pattern"); }
  if (url.includes("verify")) { score += 25; reasons.push("Fake verification"); }
  if (!url.includes("https")) { score += 20; reasons.push("No HTTPS"); }

  let level = "CLEAN";
  let color = "safe";

  if (score > 40) { level = "SUSPICIOUS"; color = "mid"; }
  if (score > 70) { level = "DANGEROUS"; color = "bad"; }

  saveHistory({
    type: "url",
    url,
    score,
    level,
    reasons
  });

  document.getElementById("urlResult").innerHTML =
`Risk: <span class="${color}">${level}</span>
Score: ${score}/100`;

  generateAIExplanation(level, reasons);
}

/* ---------------- AI EXPLANATION ---------------- */
function generateAIExplanation(level, reasons) {
  let text = "";

  if (level === "CLEAN") {
    text = "This URL appears safe with no strong malicious indicators.";
  } else if (level === "SUSPICIOUS") {
    text = "This URL shows patterns commonly used in phishing or fake login pages.";
  } else {
    text = "High-risk indicators detected. Avoid interacting with this site.";
  }

  if (reasons.length) {
    text += "\n\nSignals:\n- " + reasons.join("\n- ");
  }

  document.getElementById("aiExplain").innerText = "🧠 AI Explanation:\n\n" + text;
}

/* ---------------- FILE SCAN ---------------- */
function scanFile() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select file");

  const name = file.name.toLowerCase();

  let score = 0;
  let flags = [];

  if (name.includes("hack")) { score += 35; flags.push("Suspicious keyword"); }
  if (name.includes("crack")) { score += 40; flags.push("Crack tool pattern"); }
  if (name.includes("inject")) { score += 45; flags.push("Injection pattern"); }

  let status = "✔ CLEAN";
  if (score > 40) status = "❗ FLAGGED";

  const result = {
    type: "file",
    file: file.name,
    score,
    status,
    flags
  };

  saveHistory(result);

  document.getElementById("fileResult").innerHTML =
`File: ${file.name}
Status: ${status}
Score: ${score}/100

Flags:
${flags.length ? flags.map(f => "• " + f).join("\n") : "• None"}`;
}

/* ---------------- HISTORY ---------------- */
function saveHistory(data) {
  let history = JSON.parse(localStorage.getItem("history") || "[]");
  history.unshift(data);
  localStorage.setItem("history", JSON.stringify(history));
}

function loadHistory() {
  let history = JSON.parse(localStorage.getItem("history") || "[]");

  document.getElementById("history").innerHTML =
    history.map(h => `
      <div class="card">
        ${h.type === "url" ? "🌐 " + h.url : "📁 " + h.file}<br>
        Score: ${h.score}<br>
        Level: ${h.level || h.status}
      </div>
    `).join("") || "No history yet";
}

/* ---------------- THREAT DB ---------------- */
function generateReport() {
  const url = document.getElementById("reportUrl").value;
  const type = document.getElementById("reportType").value;

  if (!url) return alert("Enter URL");

  reportText =
`SCAM REPORT
URL: ${url}
TYPE: ${type}`;

  document.getElementById("reportOutput").innerText = reportText;

  let db = JSON.parse(localStorage.getItem("threatDB") || "[]");
  db.push({ url, type });
  localStorage.setItem("threatDB", JSON.stringify(db));
}

function loadThreatDB() {
  let db = JSON.parse(localStorage.getItem("threatDB") || "[]");

  document.getElementById("threatDB").innerHTML =
    db.map(d => `
      <div class="card">
        🌍 ${d.url}<br>
        Type: ${d.type}
      </div>
    `).join("") || "No threats reported yet";
}

/* ---------------- REPORTING ---------------- */
function sendMicrosoft() {
  if (!reportText) return alert("Generate report first");
  navigator.clipboard.writeText(reportText);
  window.open("https://www.microsoft.com/en-us/wdsi/support/report-unsafe-site", "_blank");
}

function sendGoogle() {
  if (!reportText) return alert("Generate report first");
  navigator.clipboard.writeText(reportText);
  window.open("https://safebrowsing.google.com/safebrowsing/report_phish/", "_blank");
}

</script>

</body>
</html>
